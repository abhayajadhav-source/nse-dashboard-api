services:
  - type: web
    name: nse-dashboard-api
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: DATABASE_URL
        # We'll set this manually in the dashboard — it points to the SAME
        # Postgres instance used by the scanner crons.
        sync: false
